[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "weekly-ai-podcast"
version = "0.1.0"
description = "Weekly ~5-minute AI & insurance news podcast, generated by Claude + ElevenLabs, delivered via Gmail."
requires-python = ">=3.11"
readme = "README.md"

[tool.setuptools.packages.find]
include = ["podcast*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
