name: Ship weekly episode

on:
  schedule:
    - cron: '0 13 * * 5'     # Fri 13:00 UTC = 09:00 EST (EDT handled by cron drift; workflow_dispatch as fallback)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  ship:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Ship approved episode (if any)
        run: python -m podcast ship
        env:
          SMTP_USER:           ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD:   ${{ secrets.SMTP_APP_PASSWORD }}
          REVIEWER_EMAIL:      ${{ secrets.REVIEWER_EMAIL }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY:  ${{ secrets.ELEVENLABS_API_KEY }}
          GH_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
